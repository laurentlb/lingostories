<!doctype html>
<html lang="en">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="LingoStories"/>
<meta name="description" property="og:description" content="Read free interactive stories in {{language}} to practice languages." />

<link rel="canonical" href="https://lingostories.org/{{lang_code}}/">
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/site.webmanifest">

<title>LingoStories - Interactive stories in {{language}} for language learners</title>
<script type="module" src="/js/main.js"></script>
<script src="/js/third_party/ink.js"></script>

<link rel="stylesheet" href="/style.css">

<div class="top">
    <div class="icon-bar">
        <a href="/" id="back-icon"><img src="/img/back.svg" class="icon top-icon" title="Back to the story list"></a>
        <a href="/" id="home-icon"><img src="/img/flags/{{lang_code}}.svg" class="top-icon" title="Stories in {{language}}.&#10;Switch target language?"></a>
        
        <img src="/img/options.svg" id="settings-icon" class="icon top-icon" title="Settings" data-action="toggle-settings">

        <img src="/img/restart.svg" id="restart-icon" class="icon top-icon" title="Restart the story" data-action="reset-story">

        <div id="collection-count" class="text-icon" data-action="toggle-collection"></div>
    </div>
    {% include 'settings.html' %}
    <div class="top-collection">
        <p>Each story has images to collect. The images you collect in
            this story will be added here.</p>

        <div class="top-image-collection"></div>
    </div>
</div>

<div class="main">
    <div class="middle">
        <div class="title home">
            <h1> <img src="/img/logo.svg" class="main-logo"> LingoStories </h1>
            <p>
                Free interactive stories for language learners.
            </p>
        </div>

        <div class="home" id="story-selector">
            <h3>Select a story to read in {{language}}.</h3>
            <div class="story-list"></div>

            <div id="badges-section" style="display: none;">
                <h3>Your badges</h3>
                <div id="badges-strip" class="badges-strip" aria-label="Your badges"></div>
            </div>
        </div>

        <div class="in-story story-page-intro">
            <div class="story-credits-row">
                <p id="story-credits-line" class="story-credits-line"></p>
                <button type="button" id="story-help-btn" class="story-help-btn" data-action="story-help-open" aria-haspopup="dialog">Help</button>
            </div>
            <div id="story-cover-wrap" class="story-cover-wrap">
                <img id="story-cover-img" class="story-cover-img" src="" alt="" loading="eager" width="280" height="280" />
            </div>
        </div>

        <div class="in-story story"></div>

        <div class="story-end">
            <img class="certificate" src="/img/certificate-badge.svg">
            <h2>Congratulations!</h2>
            <p class="story-end-text"></p>

            <div class="story-share-actions">
                <button type="button" class="story-share-btn" data-action="story-share-copy">Share</button>
            </div>
            <p class="story-share-status" aria-live="polite"></p>

            <div>
                <a id="back-to-menu"><img class="icon player-icon" src="/img/exit.svg" title="Choose another story"></a>
                <img class="icon player-icon" src="/img/restart.svg" title="Restart the story" data-action="reset-story">
            </div>
        </div>

        <div class="info-box speech-recognition">
            <img id="listening-icon" class="icon player-icon" src="/img/microphone.svg" title="Speech recognition" data-action="toggle-listening">
            <div class="output"></div>
        </div>

        <div class="in-story inventory"></div>

        <div class="in-story" style="height: 30vh;"></div>
        
        <div class="home">
            {% include 'faq.html' %}
        </div>
    </div>

</div>
<div class="footer">
    <img class="icon player-icon" id="player-next" src="/img/player-play.svg" title="Continue (Space key)" data-action="continue-story">
    <img class="icon player-icon" id="microphone-button" src="/img/microphone.svg" title="Repeat out loud in your Microphone (M key)" data-action="listen-mic">
</div>

<template id="story-help-dialog-template">
    <dialog class="explain-modal story-help-dialog" aria-labelledby="story-help-dialog-title">
        <div class="header">
            <h2 class="explain-modal-title" id="story-help-dialog-title">Help</h2>
            <button type="button" class="close-button" aria-label="Close">×</button>
        </div>
        <div class="content story-help-dialog-body">
            <ul>
                <li>Check the settings in the top bar to customize your experience. For example,
                    you can hide the transcript to practice listening comprehension.
                <li><a href="/guide.html" target="_blank">Read the user guide</a> for more learning tips.</li>
                <li>Listen to each sentence as many times as you want, and check the translation if needed.</li>
                <li>Click the triangle button at the bottom to continue.</li>
            </ul>
        </div>
    </dialog>
</template>

<template id="explain-dialog-template">
    <dialog class="explain-modal" aria-labelledby="explain-modal-title">
        <div class="header">
            <h1 class="explain-modal-title" id="explain-modal-title"></h1>
            <button type="button" class="close-button" aria-label="Close">×</button>
        </div>
        <div class="content">
            <p class="explain-modal-body"></p>
        </div>
    </dialog>
</template>

<script>
const LANGUAGE = "{{language}}";
const LANG_CODE = "{{lang_code}}";
</script>

<script data-goatcounter="https://lingostories.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
